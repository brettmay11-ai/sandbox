<style>

body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

const FIPS={"01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV","55":"WI","56":"WY"};

function generate2026Schedule(){
  const D={'AFC East':['BUF','MIA','NE','NYJ'],'AFC North':['BAL','CIN','CLE','PIT'],'AFC South':['HOU','IND','JAX','TEN'],'AFC West':['DEN','KC','LV','LAC'],'NFC East':['DAL','NYG','PHI','WAS'],'NFC North':['CHI','DET','GB','MIN'],'NFC South':['ATL','CAR','NO','TB'],'NFC West':['SF','ARI','LAR','SEA']};
  const intraRot={'AFC East':'AFC West','AFC North':'AFC South','AFC South':'AFC North','AFC West':'AFC East','NFC East':'NFC West','NFC North':'NFC South','NFC South':'NFC North','NFC West':'NFC East'};
  const crossRot={'AFC East':'NFC South','AFC North':'NFC East','AFC South':'NFC North','AFC West':'NFC West','NFC East':'AFC North','NFC North':'NFC South','NFC South':'NFC West','NFC West':'AFC East'};
  const seventeenth={'AFC East':'NFC North','AFC North':'NFC West','AFC South':'NFC East','AFC West':'NFC South'};
  const r={};for(const t of Object.values(D).flat())r[t]={home:[],away:[]};
  for(const[dn,ts]of Object.entries(D))for(let i=0;i<ts.length;i++)for(let j=0;j<ts.length;j++)if(i!==j){r[ts[i]].away.push(ts[j]);r[ts[i]].home.push(ts[j])}
  for(const[dn,ts]of Object.entries(D)){const rd=D[intraRot[dn]];if(!rd)continue;for(let i=0;i<4;i++){r[ts[i]].away.push(rd[i],rd[(i+2)%4]);r[ts[i]].home.push(rd[(i+1)%4],rd[(i+3)%4])}}
  for(const[dn,ts]of Object.entries(D)){const cd=D[crossRot[dn]];if(!cd)continue;for(let i=0;i<4;i++){r[ts[i]].away.push(cd[(i+1)%4],cd[(i+3)%4]);r[ts[i]].home.push(cd[i],cd[(i+2)%4])}}
  const confDivs={AFC:['AFC East','AFC North','AFC South','AFC West'],NFC:['NFC East','NFC North','NFC South','NFC West']};
  for(const conf of['AFC','NFC']){const cd=confDivs[conf];for(const dn of cd){const ts=D[dn];const rem=cd.filter(d=>d!==dn&&d!==intraRot[dn]);for(let i=0;i<4;i++)for(const rd of rem){const opp=D[rd][i];if(cd.indexOf(dn)<cd.indexOf(rd))r[ts[i]].away.push(opp);else r[ts[i]].home.push(opp)}}}
  for(const[dn,ts]of Object.entries(D)){const sd=seventeenth[dn];if(sd){const opp=D[sd];for(let i=0;i<4;i++)r[ts[i]].away.push(opp[i])}else{for(const[ad,nd]of Object.entries(seventeenth)){if(nd===dn){const at=D[ad];for(let i=0;i<4;i++)r[ts[i]].home.push(at[i])}}}}
  return r;
}
const SCHED_2026=generate2026Schedule();

function getTeam(abbr){return NFL_TEAMS.find(t=>t.abbr===abbr)}
function fullName(team){return team.location+' '+team.name}
function haversine(lat1,lng1,lat2,lng2){const R=3959;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}

let currentMapTeam=null;let awayGamesData=[];let projection=null;let pathGen=null;

async function initMap(){
  try{
    const us=await d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json");
    const states=topojson.feature(us,us.objects.states);
    projection=d3.geoAlbersUsa().scale(1070).translate([480,250]);
    pathGen=d3.geoPath().projection(projection);

    const mapGroup=d3.select("#us-map-group");
    mapGroup.selectAll("path.state-path").data(states.features).enter().append("path")
      .attr("class","state-path").attr("d",pathGen).attr("data-fips",d=>d.id);
    mapGroup.selectAll("text.state-label").data(states.features).enter().append("text")
      .attr("class","state-label")
      .attr("transform",d=>{const c=pathGen.centroid(d);if(isNaN(c[0]))return"translate(-1000,-1000)";return`translate(${c[0]},${c[1]})`})
      .text(d=>FIPS[String(d.id).padStart(2,'0')]||"");
  }catch(err){
    console.error("Failed to load map data",err);
    document.getElementById('sidebar-away-list').innerHTML='<p class="text-xs text-red-400">Failed to load map data.</p>';
  }

  const select=document.getElementById('map-team-select');
  NFL_TEAMS.forEach(t=>{select.innerHTML+=`<option value="${t.abbr}">${fullName(t)} (${t.div})</option>`});
  select.value='SEA';
  renderMap();
}

function renderMap(){
  if(!projection)return;
  const abbr=document.getElementById('map-team-select').value;
  const team=getTeam(abbr);
  if(!team)return;
  currentMapTeam=abbr;

  const awayAbbrs=SCHED_2026[abbr]?SCHED_2026[abbr].away:[];
  let totalMiles=0;
  awayGamesData=awayAbbrs.map(oppAbbr=>{const opp=getTeam(oppAbbr);const dist=haversine(team.lat,team.lng,opp.lat,opp.lng);totalMiles+=dist;return{abbr:oppAbbr,team:opp,distance:dist}});
  awayGamesData.sort((a,b)=>b.distance-a.distance);

  document.getElementById('sidebar-team-name').textContent=fullName(team)+' Away Games';
  document.getElementById('sidebar-team-subtitle').textContent=`${team.city}, ${team.state} • ${team.tz}`;
  document.getElementById('sidebar-total-miles').textContent=totalMiles.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",")+' mi';

  const listEl=document.getElementById('sidebar-away-list');
  listEl.innerHTML=awayGamesData.map(g=>{
    const distColor=g.distance>1500?'text-red-400':g.distance<500?'text-green-400':'text-brand-400';
    const tag=g.distance>1500?'<span class="text-[8px] px-1.5 py-0.5 bg-red-500/15 text-red-400 rounded ml-1">LONG</span>':
              g.distance<500?'<span class="text-[8px] px-1.5 py-0.5 bg-green-500/15 text-green-400 rounded ml-1">SHORT</span>':'';
    return`<div class="away-item p-2.5 rounded-lg border border-white/6 cursor-pointer" data-dest="${g.abbr}"
              onmouseenter="highlightDestination('${g.abbr}')" onmouseleave="clearHighlight()">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-medium">${fullName(g.team)}</span>
        <span class="text-[11px] font-mono ${distColor}">${g.distance.toFixed(0)} mi${tag}</span>
      </div>
      <div class="text-[9px] text-white/30 mt-0.5">${g.team.city}, ${g.team.state}</div>
    </div>`;
  }).join('');

  const svg=d3.select("#map-svg");
  const homeCoords=projection([team.lng,team.lat]);
  if(!homeCoords)return;

  // --- Travel Lines ---
  const linesGroup=svg.select("#svg-lines");
  linesGroup.selectAll("*").remove();

  awayGamesData.forEach((g,i)=>{
    const destCoords=projection([g.team.lng,g.team.lat]);
    if(!destCoords)return;
    const isLong=g.distance>1500;
    const baseColor=isLong?"rgba(239,68,68,":"rgba(249,115,22,";

    linesGroup.append("line")
      .attr("x1",homeCoords[0]).attr("y1",homeCoords[1])
      .attr("x2",destCoords[0]).attr("y2",destCoords[1])
      .attr("stroke",baseColor+"0.08)")
      .attr("stroke-width",4).attr("stroke-linecap","round");

    const len=Math.sqrt(Math.pow(destCoords[0]-homeCoords[0],2)+Math.pow(destCoords[1]-homeCoords[1],2));
    linesGroup.append("line")
      .attr("x1",homeCoords[0]).attr("y1",homeCoords[1])
      .attr("x2",destCoords[0]).attr("y2",destCoords[1])
      .attr("stroke",baseColor+"0.4)")
      .attr("stroke-width",1.5).attr("stroke-linecap","round")
      .attr("data-dest",g.abbr)
      .attr("stroke-dasharray",len).attr("stroke-dashoffset",len)
      .style("animation",`draw-line 1.2s ease ${i*0.05}s forwards`);
  });

  // --- Team Dots ---
  const dotsGroup=svg.select("#svg-dots");
  dotsGroup.selectAll("*").remove();

  NFL_TEAMS.forEach(t=>{
    const coords=projection([t.lng,t.lat]);
    if(!coords)return;
    const isHome=t.abbr===abbr;
    const isAway=awayAbbrs.includes(t.abbr);

    const g=dotsGroup.append("g")
      .attr("transform",`translate(${coords[0]},${coords[1]})`)
      .style("cursor","pointer").attr("data-abbr",t.abbr);

    if(isHome){
      // Expanding pulse ring
      g.append("circle").attr("r",10).attr("fill","none")
        .attr("stroke","#f97316").attr("stroke-width",2)
        .style("animation","home-ring-pulse 2s ease-out infinite");
      
      // Orange glow behind white dot
      g.append("circle").attr("r",8).attr("fill","#f97316").attr("opacity",0.5)
        .attr("filter","url(#home-glow)");

      // Big white dot
      g.append("circle").attr("r",7).attr("fill","#ffffff")
        .attr("stroke","#f97316").attr("stroke-width",2.5)
        .style("animation","home-pulse 2s ease-in-out infinite");

      // Label above dot
      g.append("text")
        .attr("y",-14).attr("text-anchor","middle")
        .attr("fill","#f97316").attr("font-size","8px").attr("font-weight","800")
        .attr("font-family","Inter, sans-serif").attr("letter-spacing","0.5px")
        .text(t.abbr);

    }else if(isAway){
      // Animated ring
      g.append("circle").attr("r",6).attr("fill","none")
        .attr("stroke",t.color).attr("stroke-width",1.5).attr("opacity",0.5)
        .style("animation","dest-ring 3s ease-out infinite");

      // Team color glow behind white dot
      g.append("circle").attr("r",6).attr("fill",t.color).attr("opacity",0.35)
        .attr("filter","url(#dot-glow)");

      // Big white dot with team-color border
      g.append("circle").attr("r",5.5).attr("fill","#ffffff")
        .attr("stroke",t.color).attr("stroke-width",2.5);

      // Label above dot
      g.append("text")
        .attr("y",-11).attr("text-anchor","middle")
        .attr("fill","rgba(255,255,255,0.9)").attr("font-size","6.5px").attr("font-weight","700")
        .attr("font-family","Inter, sans-serif")
        .text(t.abbr);

    }else{
      // Subtle glow
      g.append("circle").attr("r",4).attr("fill","rgba(255,255,255,0.08)")
        .attr("filter","url(#dot-glow)");

      // White dot
      g.append("circle").attr("r",4).attr("fill","rgba(255,255,255,0.7)")
        .attr("stroke","rgba(255,255,255,0.2)").attr("stroke-width",1);
    }

    // Tooltip
    const tooltip=document.getElementById('map-tooltip');
    g.on("mouseenter",(event)=>{
      const dist=isHome?null:haversine(team.lat,team.lng,t.lat,t.lng).toFixed(0);
      tooltip.innerHTML=`
        <div class="text-xs font-bold mb-1" style="color:${isHome?'#f97316':t.color}">${fullName(t)}</div>
        <div class="text-[10px] text-white/50">${t.city}, ${t.state}</div>
        <div class="text-[10px] text-white/40">${t.stadium}</div>
        ${isHome?'<div class="text-[10px] text-brand-500 mt-1.5 font-medium">⬤ HOME</div>':
          `<div class="text-[10px] font-mono mt-1.5 ${isAway?'text-brand-400':'text-white/30'}">↗ ${Number(dist).toLocaleString()} mi from ${team.location}</div>`}
      `;
      tooltip.classList.add('visible');
      positionTooltip(event);
    })
    .on("mousemove",positionTooltip)
    .on("mouseleave",()=>tooltip.classList.remove('visible'));
  });
}

function positionTooltip(event){
  const tooltip=document.getElementById('map-tooltip');
  const wrap=document.getElementById('map-wrap');
  const rect=wrap.getBoundingClientRect();
  let tx=event.clientX-rect.left+16;
  let ty=event.clientY-rect.top-20;
  if(tx+200>rect.width)tx=event.clientX-rect.left-200;
  if(ty<10)ty=10;
  tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';
}

function highlightDestination(destAbbr){
  d3.selectAll('#svg-lines line[data-dest]').each(function(){
    const line=d3.select(this);
    if(line.attr('data-dest')===destAbbr){
      line.attr('stroke','rgba(249,115,22,0.9)').attr('stroke-width',3);
    }else{
      line.attr('stroke','rgba(249,115,22,0.04)').attr('stroke-width',0.5);
    }
  });
  d3.selectAll('#svg-dots g').each(function(){
    const g=d3.select(this);
    if(g.attr('data-abbr')===destAbbr){
      g.selectAll("circle").attr("r",function(d,i){return parseFloat(d3.select(this).attr("r"))*1.6;});
    }
  });
  document.querySelectorAll('.away-item').forEach(item=>{
    item.classList.toggle('highlighted',item.dataset.dest===destAbbr);
  });
}

function clearHighlight(){if(currentMapTeam)renderMap();}

const style=document.createElement('style');
style.textContent=`@keyframes draw-line{to{stroke-dashoffset:0}}`;
document.head.appendChild(style);

document.addEventListener('DOMContentLoaded',initMap);
</script>
</body>
</html>
