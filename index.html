<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog's Birthday Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 0;
        }

        /* Navigation Menu Styles */
        nav {
            background-color: #1e8449;
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        /* Main Content Container */
        .content-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            position: relative;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .calendar {
            width: 100%;
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #2ecc71;
            padding: 10px;
            font-size: 12px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f5f5f5;
            color: #333;
            position: relative;
            overflow: hidden;
        }

        .day:hover {
            background: #e8e8e8;
            transform: scale(1.05);
        }

        .empty {
            background: transparent;
            cursor: default;
        }

        .empty:hover {
            background: transparent;
            transform: none;
        }

        .birthday {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            animation: pulse 1.5s infinite;
        }

        .birthday:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.6);
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            }
            50% {
                box-shadow: 0 4px 25px rgba(46, 204, 113, 0.8);
            }
        }

        .birthday-label {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            background: #d5f4e6;
            border-left: 4px solid #2ecc71;
            border-radius: 5px;
            color: #186a3b;
            font-size: 14px;
            font-weight: bold;
        }

        .emoji {
            font-size: 20px;
            margin-right: 8px;
        }

        /* Balloon animation styles */
        .balloon {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(var(--drift)) scale(0.8);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .balloon.float {
            animation: float-up 3s ease-in forwards;
        }

        .balloon.pop {
            animation: pop 0.4s ease-out forwards;
        }

        /* Confetti animation */
        .confetti {
            position: fixed;
            pointer-events: none;
            font-size: 18px;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100px) translateX(var(--drift)) rotate(360deg);
            }
        }

        .confetti {
            animation: confetti-fall 2s ease-out forwards;
        }

        /* Click ripple effect */
        .day.clicked {
            animation: click-pulse 0.6s ease-out;
        }

        @keyframes click-pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Menu -->
    <nav>
        <ul>
            <li><a href="https://www.petco.com/" target="_blank">🐾 Petco</a></li>
            <li><a href="https://www.petsmart.com/" target="_blank">🦴 PetSmart</a></li>
            <li><a href="https://www.rover.com/" target="_blank">🐕 Rover</a></li>
            <li><a href="https://www.chewy.com/" target="_blank">🍖 Chewy</a></li>
            <li><a href="https://www.akcdog.org/" target="_blank">🏅 AKC</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <div class="container">
            <h1>🐾 Dog's Birthday Calendar</h1>
            <p class="subtitle">May 2026</p>

            <div class="calendar">
                <div class="month-header">
                    <span class="month-title">May 2026</span>
                </div>

                <div class="weekdays">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>

                <div class="days" id="calendarDays"></div>
            </div>

            <div class="birthday-label">
                <span class="emoji">🎂</span> Birthday: May 28th
            </div>
        </div>
    </div>

    <script>
        const balloonEmojis = ['🎈', '🎉', '🎊', '🎁'];
        const confettiEmojis = ['✨', '⭐', '🌟', '💫'];

        function createBalloon(x, y) {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
            balloon.style.left = x + 'px';
            balloon.style.top = y + 'px';
            const drift = (Math.random() - 0.5) * 200;
            balloon.style.setProperty('--drift', drift + 'px');
            
            document.body.appendChild(balloon);
            
            // Random delay before floating
            setTimeout(() => {
                balloon.classList.add('float');
            }, Math.random() * 100);

            // Remove after animation
            setTimeout(() => {
                balloon.remove();
            }, 3100);
        }

        function createConfetti(x, y) {
            const count = 8;
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                const drift = (Math.random() - 0.5) * 150;
                confetti.style.setProperty('--drift', drift + 'px');
                confetti.style.animationDelay = (i * 0.05) + 's';
                
                document.body.appendChild(confetti);

                // Remove after animation
                setTimeout(() => {
                    confetti.remove();
                }, 2100);
            }
        }

        function handleDayClick(event) {
            const dayElement = event.currentTarget;
            
            // Don't animate empty days
            if (dayElement.classList.contains('empty')) {
                return;
            }

            // Add click pulse animation
            dayElement.classList.add('clicked');
            setTimeout(() => {
                dayElement.classList.remove('clicked');
            }, 600);

            // Get the position of the clicked day
            const rect = dayElement.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            // Create multiple balloons
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createBalloon(x, y);
                }, i * 100);
            }

            // Create confetti burst
            createConfetti(x, y);

            // Extra celebration for birthday
            if (dayElement.classList.contains('birthday')) {
                setTimeout(() => {
                    for (let i = 0; i < 8; i++) {
                        createBalloon(x, y);
                    }
                }, 300);
            }
        }

        function generateCalendar() {
            const year = 2026;
            const month = 4; // May (0-indexed)
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const calendarDays = document.getElementById('calendarDays');

            // Add empty cells for days before the first day of the month
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'day empty';
                calendarDays.appendChild(emptyDay);
            }

            // Add days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day';
                dayElement.textContent = day;

                // Highlight the birthday
                if (day === 28) {
                    dayElement.classList.add('birthday');
                    dayElement.textContent = '🎉 28';
                }

                // Add click event listener
                dayElement.addEventListener('click', handleDayClick);

                calendarDays.appendChild(dayElement);
            }
        }

        // Generate calendar when page loads
        generateCalendar();
    </script>
</body>
</html>
