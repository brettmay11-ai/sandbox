<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In | NFL Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<style>
*{box-sizing:border-box}body{font-family:Inter,system-ui,sans-serif;background:#07111d;color:#fff}.field{position:fixed;inset:0;overflow:hidden;background:#0b3824}.field:before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent calc(10% - 1px),rgba(255,255,255,.13) calc(10% - 1px),rgba(255,255,255,.13) 10%)}.field:after{content:'';position:absolute;inset:0;background:rgba(2,9,16,.72)}.yard-number{position:absolute;z-index:1;top:50%;transform:translate(-50%,-50%);font-size:clamp(44px,8vw,110px);font-weight:900;color:rgba(255,255,255,.035)}.login-shell{position:relative;z-index:2;background:#0b1119;border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 80px rgba(0,0,0,.5)}.logo-wrap{background:#fff;border:4px solid #d50a0a;box-shadow:0 0 0 7px #013369}.input-wrap:focus-within{border-color:#5b9bd5;background:rgba(91,155,213,.08)}input:-webkit-autofill{-webkit-box-shadow:0 0 0 1000px #111a25 inset;-webkit-text-fill-color:#fff}.submit-btn:disabled{opacity:.65;cursor:wait}@media(max-width:640px){.yard-number{display:none}}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">
<div class="field" aria-hidden="true"><span class="yard-number" style="left:15%">20</span><span class="yard-number" style="left:35%">40</span><span class="yard-number" style="left:50%">50</span><span class="yard-number" style="left:65%">40</span><span class="yard-number" style="left:85%">20</span></div>
<main class="login-shell w-full max-w-[440px]">
  <div class="h-2 bg-[#d50a0a]"></div>
  <div class="px-6 pt-8 pb-6 sm:px-9 sm:pt-10 text-center border-b border-white/10">
    <div class="logo-wrap w-20 h-20 mx-auto mb-6 grid place-items-center rounded-full">
      <img src="https://a.espncdn.com/i/teamlogos/leagues/500/nfl.png" alt="NFL shield" class="w-12 h-14 object-contain">
    </div>
    <p class="text-[10px] uppercase font-bold tracking-[.24em] text-[#5b9bd5]">Student Portal</p>
    <h1 class="text-3xl sm:text-4xl font-black mt-2">NFL Classroom</h1>
    <p class="text-sm text-white/45 mt-3 leading-relaxed">Follow your team. Build your knowledge. Earn XP.</p>
  </div>
  <form id="login-form" class="p-6 sm:p-9 space-y-5">
    <label class="block"><span class="text-[11px] uppercase font-bold tracking-wider text-white/50">Username</span><div class="input-wrap mt-2 flex items-center border border-white/12 bg-white/[.035] transition"><iconify-icon icon="lucide:user" class="ml-4 text-white/35"></iconify-icon><input id="username" autocomplete="username" required maxlength="32" autofocus class="w-full bg-transparent px-3 py-3.5 outline-none text-sm" placeholder="Enter your username"></div></label>
    <label class="block"><span class="text-[11px] uppercase font-bold tracking-wider text-white/50">PIN</span><div class="input-wrap mt-2 flex items-center border border-white/12 bg-white/[.035] transition"><iconify-icon icon="lucide:lock-keyhole" class="ml-4 text-white/35"></iconify-icon><input id="pin" type="password" inputmode="numeric" autocomplete="current-password" required minlength="4" maxlength="8" pattern="[0-9]{4,8}" class="w-full bg-transparent px-3 py-3.5 text-lg tracking-[.3em] outline-none" placeholder="••••"></div></label>
    <div id="message" role="alert" class="hidden p-3 text-sm border"></div>
    <button id="submit" class="submit-btn w-full bg-[#013369] hover:bg-[#084b8a] border border-[#5b9bd5]/40 py-3.5 font-bold transition flex items-center justify-center gap-2"><iconify-icon icon="lucide:log-in"></iconify-icon><span>Enter the Classroom</span></button>
    <p class="text-center text-[11px] text-white/35">Use the username and PIN provided by your teacher.</p>
  </form>
  <div class="px-6 py-4 border-t border-white/10 flex items-center justify-center gap-2 text-[10px] uppercase tracking-wider text-white/25"><iconify-icon icon="lucide:shield-check"></iconify-icon> Classroom accounts only</div>
</main>
<script>
const form=document.getElementById('login-form'),message=document.getElementById('message'),submit=document.getElementById('submit');
form.addEventListener('submit',async event=>{event.preventDefault();message.classList.add('hidden');submit.disabled=true;submit.innerHTML='<iconify-icon icon="lucide:loader-circle" class="animate-spin"></iconify-icon><span>Signing in...</span>';try{const response=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,pin:document.getElementById('pin').value})});const data=await response.json();if(!response.ok)throw new Error(data.error||'Could not sign in.');window.location.href=data.user.role==='teacher'?'/teacher':'/';}catch(error){message.textContent=error.message;message.className='p-3 text-sm bg-red-500/10 border border-red-500/30 text-red-300';}finally{submit.disabled=false;submit.innerHTML='<iconify-icon icon="lucide:log-in"></iconify-icon><span>Enter the Classroom</span>';}});
</script>
</body>
</html>
